apiVersion: rabbitmq.com/v1beta1
kind: Vhost
metadata:
  name: vhost-notifications
  namespace: notifications-system
spec:
  name: vhost_notifications
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: notifications-svc-user
  namespace: notifications-system
spec:
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
  importCredentialsSecret:
    name: notifications-svc-credentials
---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: notifications-svc-permission
  namespace: notifications-system
spec:
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
  user: notifications-svc-user
  vhost: vhost_notifications
  permissions:
    configure: ".*"
    write: ".*"
    read: ".*"
---
apiVersion: rabbitmq.com/v1beta1
kind: Exchange
metadata:
  name: notification-broadcast
  namespace: notifications-system
spec:
  name: notification_broadcast
  vhost: vhost_notifications
  type: fanout
  durable: true
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: Exchange
metadata:
  name: notification-dlx
  namespace: notifications-system
spec:
  name: notification_dlx
  vhost: vhost_notifications
  type: direct
  durable: true
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: email-q
  namespace: notifications-system
spec:
  name: email_q
  vhost: vhost_notifications
  type: quorum
  durable: true
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: sms-q
  namespace: notifications-system
spec:
  name: sms_q
  vhost: vhost_notifications
  type: quorum
  durable: true
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: notification-dlq
  namespace: notifications-system
spec:
  name: notification_dlq
  vhost: vhost_notifications
  type: quorum
  durable: true
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: Policy
metadata:
  name: notifications-policy
  namespace: notifications-system
spec:
  name: notifications_overflow_and_dlx
  vhost: vhost_notifications
  pattern: "^(email_q|sms_q)$"
  applyTo: queues
  definition:
    overflow: "drop-head"
    max-length: 10
    dead-letter-exchange: "notification_dlx"
    dead-letter-routing-key: "notification_failure"
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: email-binding
  namespace: notifications-system
spec:
  vhost: vhost_notifications
  source: notification_broadcast
  destination: email_q
  destinationType: queue
  routingKey: ""
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: sms-binding
  namespace: notifications-system
spec:
  vhost: vhost_notifications
  source: notification_broadcast
  destination: sms_q
  destinationType: queue
  routingKey: ""
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: Binding
metadata:
  name: notification-dlq-binding
  namespace: notifications-system
spec:
  vhost: vhost_notifications
  source: notification_dlx
  destination: notification_dlq
  destinationType: queue
  routingKey: "notification_failure"
  rabbitmqClusterReference:
    name: rabbitmq-prod
    namespace: rabbitmq
