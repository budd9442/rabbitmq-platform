apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-security-policy
  namespace: rabbitmq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rabbitmq
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow AMQP, Management, and Metrics ports from authorized sources
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vpn
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: rabbitmq-system
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
    - podSelector: {}
    - ipBlock:
        cidr: 10.0.0.0/16
    - ipBlock:
        cidr: 10.1.0.0/16
    - ipBlock:
        cidr: 10.244.0.0/16
    - ipBlock:
        cidr: 10.245.0.0/16
    - ipBlock:
        cidr: 10.96.0.0/16
    - ipBlock:
        cidr: 10.97.0.0/16
    ports:
    - protocol: TCP
      port: 5671
    - protocol: TCP
      port: 5672
    - protocol: TCP
      port: 15671
    - protocol: TCP
      port: 15672
    - protocol: TCP
      port: 15692
    - protocol: TCP
      port: 4369
    - protocol: TCP
      port: 25672
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow egress to VPN tunnel
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vpn
  # Allow egress within the cluster
  - to:
    - podSelector: {}
  # Allow egress to Tencent DR subnets over VPN
  - to:
    - ipBlock:
        cidr: 10.1.0.0/16
    - ipBlock:
        cidr: 10.245.0.0/16
    - ipBlock:
        cidr: 10.97.0.0/16
