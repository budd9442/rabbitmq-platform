apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: budd9442@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - http01:
        ingress:
          class: traefik
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rmq-cors
  namespace: rabbitmq
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - OPTIONS
      - DELETE
    accessControlAllowHeaders:
      - Authorization
      - Content-Type
    accessControlAllowOriginList:
      - https://grafana.budd.codes
    accessControlAllowCredentials: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rabbitmq-ingress
  namespace: rabbitmq
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: rabbitmq-rmq-cors@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: dr.rmq.budd.codes
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rabbitmq-prod
            port:
              number: 15672
  tls:
  - hosts:
    - dr.rmq.budd.codes
    secretName: dr-rmq-tls
