apiVersion: rabbitmq.com/v1beta1
kind: Shovel
metadata:
  name: cross-site-shovel
  namespace: rabbitmq
spec:
  name: cross-site-shovel
  rabbitmqClusterReference:
    name: rabbitmq-prod
  vhost: "/"
  srcExchange: "orders-exchange"
  srcExchangeKey: "#"
  destExchange: "orders-exchange"
  uriSecret:
    name: shovel-secrets
