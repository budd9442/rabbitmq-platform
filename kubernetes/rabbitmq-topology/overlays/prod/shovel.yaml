apiVersion: rabbitmq.com/v1beta1
kind: Shovel
metadata:
  name: cross-site-shovel
  namespace: rabbitmq
spec:
  name: cross-site-shovel
  rabbitmqClusterReference:
    name: rabbitmq-prod
  vhost: "/"
  srcQueue: "replicated-queue"
  destQueue: "replicated-queue"
  uriSecret:
    name: shovel-secrets
