apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-dr-metrics
  namespace: rabbitmq
  labels:
    app.kubernetes.io/part-of: rabbitmq
spec:
  ports:
  - name: prometheus
    port: 15692
    targetPort: 15692
---
apiVersion: v1
kind: Endpoints
metadata:
  name: rabbitmq-dr-metrics
  namespace: rabbitmq
subsets:
- addresses:
  - ip: 10.97.7.167 # Tencent cluster Service IP for rabbitmq-prod
  ports:
  - name: prometheus
    port: 15692
