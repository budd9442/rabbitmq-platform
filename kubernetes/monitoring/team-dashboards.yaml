apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-observability-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_dashboard_folder: "Orders Team"
data:
  orders-observability.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "title": "Active Consumers (Orders)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rabbitmq_detailed_queue_consumers{vhost=\"vhost_orders\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 2,
          "title": "Overall Message Publish Rate",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(rabbitmq_detailed_queue_messages_published_total{vhost=\"vhost_orders\"}[1m]))",
              "instant": true,
              "refId": "A"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 3,
          "title": "Cluster Nodes Count",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "targets": [
            {
              "expr": "count(rabbitmq_identity_info{job=\"rabbitmq-prod\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 4,
          "title": "Throughput Publish vs Deliver Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(rabbitmq_detailed_queue_messages_published_total{vhost=\"vhost_orders\"}[1m]))",
              "legendFormat": "Publish Rate",
              "refId": "A"
            },
            {
              "expr": "sum(rate(rabbitmq_detailed_queue_messages_delivered_total{vhost=\"vhost_orders\"}[1m]))",
              "legendFormat": "Deliver Rate",
              "refId": "B"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["rabbitmq", "orders"],
      "time": { "from": "now-1h", "to": "now" },
      "title": "Orders Observability",
      "version": 1
    }

