apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-observability-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_dashboard_folder: "Orders Team"
data:
  orders-observability.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "title": "Active Consumers (Orders)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rabbitmq_detailed_queue_consumers{vhost=\"vhost_orders\"}) or sum(rabbitmq_queue_consumers{vhost=\"vhost_orders\"}) or count(orders_processed_total{status=\"unique\"}) or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 2,
          "title": "Messages in order_validation_q",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages_ready{vhost=\"vhost_orders\", queue=\"order_validation_q\"}) or sum(rabbitmq_queue_messages{vhost=\"vhost_orders\", queue=\"order_validation_q\"}) or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 200 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 3,
          "title": "Messages in order_validation_dlq",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages_ready{vhost=\"vhost_orders\", queue=\"order_validation_dlq\"}) or sum(rabbitmq_queue_messages{vhost=\"vhost_orders\", queue=\"order_validation_dlq\"}) or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 4,
          "title": "Messages Unacknowledged",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages_unacked{vhost=\"vhost_orders\"}) or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 200 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 5,
          "title": "Messaging Throughput Rates",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(orders_processed_total[1m])) or vector(0)",
              "legendFormat": "Processed Throughput Rate (msg/s)",
              "refId": "A"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 6,
          "title": "Queue Message Volumes",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "rabbitmq_queue_messages_ready{vhost=\"vhost_orders\"} or rabbitmq_queue_messages{vhost=\"vhost_orders\"} or vector(0)",
              "legendFormat": "{{queue}} Messages",
              "refId": "A"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 7,
          "title": "Queue Memory Consumption",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "sum(rabbitmq_detailed_queue_process_memory_bytes{vhost=\"vhost_orders\"}) by (queue) or sum(rabbitmq_queue_process_memory_bytes{vhost=\"vhost_orders\"}) by (queue) or vector(0)",
              "legendFormat": "{{queue}} memory",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes"
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 8,
          "title": "Unique Orders Processed",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "sum(orders_processed_total{status=\"unique\"}) or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 9,
          "title": "Duplicate Orders Filtered",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 20 },
          "targets": [
            {
              "expr": "sum(orders_processed_total{status=\"duplicate\"}) or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "yellow", "value": null },
                  { "color": "blue", "value": 10 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 10,
          "title": "Deduplication Rate (%)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 20 },
          "targets": [
            {
              "expr": "((sum(rate(orders_processed_total{status=\"duplicate\"}[5m])) or vector(0)) / (sum(rate(orders_processed_total[5m])) > 0)) * 100 or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 25 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 11,
          "title": "Order Deduplication Throughput (Unique vs Duplicate)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "sum(rate(orders_processed_total{status=\"unique\"}[1m])) or vector(0)",
              "legendFormat": "Unique Orders / sec",
              "refId": "A"
            },
            {
              "expr": "sum(rate(orders_processed_total{status=\"duplicate\"}[1m])) or vector(0)",
              "legendFormat": "Duplicate Orders / sec",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth"
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["orders", "rabbitmq", "deduplication"],
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Orders System Observability & Deduplication",
      "uid": "orders-observability"
    }
