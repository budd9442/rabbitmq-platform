apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-observability-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_dashboard_folder: "Orders Team"
data:
  orders-observability.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "title": "Active Consumers (Orders)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_consumers{vhost=\"vhost_orders\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 2,
          "title": "Messages in order_validation_q",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages{vhost=\"vhost_orders\", queue=\"order_validation_q\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 200 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 3,
          "title": "Messages in order_validation_dlq",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages{vhost=\"vhost_orders\", queue=\"order_validation_dlq\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 4,
          "title": "Messages Unacknowledged",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages_unacked{vhost=\"vhost_orders\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 200 }
                ]
              }
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 5,
          "title": "Messaging Throughput Rates",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(rabbitmq_queue_messages_published_total{queue_vhost=\"vhost_orders\"}[1m]))",
              "legendFormat": "Publish Rate (msg/s)",
              "refId": "A"
            },
            {
              "expr": "sum(rate(rabbitmq_queue_messages_delivered_ack_total{vhost=\"vhost_orders\"}[1m]))",
              "legendFormat": "Deliver Rate (msg/s)",
              "refId": "B"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 6,
          "title": "Queue Message Volumes",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "rabbitmq_queue_messages{vhost=\"vhost_orders\"}",
              "legendFormat": "{{queue}} Messages",
              "refId": "A"
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 7,
          "title": "Queue Memory Consumption",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_process_memory_bytes{vhost=\"vhost_orders\"}) by (queue)",
              "legendFormat": "{{queue}} memory",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes"
            }
          },
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["rabbitmq", "orders"],
      "time": { "from": "now-1h", "to": "now" },
      "title": "Orders Observability",
      "version": 1
    }

---
