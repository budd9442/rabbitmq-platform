    : activeClusterAuth, \\\"Content-Type\\\": \\\"application/json\\\" },\\n    \
    \    body: JSON.stringify({ properties: { delivery_mode: 2 }, routing_key: routingKey,\
    \ payload: payload, payload_encoding: \\\"string\\\" })\\n      });\\n      if\
    \ (!res.ok) throw new Error(await res.text() || res.statusText);\\n      const\
    \ result = await res.json();\\n      logTerminal(result.routed ? \\\"Success!\
    \ Message routed.\\\" : \\\"Warning: Not routed to any queue.\\\", result.routed\
    \ ? \\\"success\\\" : \\\"warn\\\");\\n    } catch (err) {\\n      logTerminal(`Error:\
    \ ${err.message}`, \\\"error\\\");\\n    }\\n  };\\n\\n  window.fetchMessages\
    \ = async function() {\\n    const queue = document.getElementById(\\\"get-queue\\\
    \").value;\\n    const count = parseInt(document.getElementById(\\\"get-count\\\
    \").value) || 5;\\n    const requeue = document.getElementById(\\\"get-requeue\\\
    \").checked;\\n    logTerminal(`Fetching up to ${count} msgs from ${queue} on\
    \ ${activeClusterName}...`, \\\"outgoing\\\");\\n    try {\\n      const res =\
    \ await fetch(`${activeClusterUrl}/api/queues/%2F/${queue}/get`, {\\n        method:\
    \ \\\"POST\\\",\\n        headers: { \\\"Authorization\\\": activeClusterAuth,\
    \ \\\"Content-Type\\\": \\\"application/json\\\" },\\n        body: JSON.stringify({\
    \ count, ackmode: requeue ? \\\"ack_requeue_true\\\" : \\\"ack_requeue_false\\\
    \", encoding: \\\"auto\\\", truncate: 50000 })\\n      });\\n      if (!res.ok)\
    \ throw new Error(await res.text() || res.statusText);\\n      const messages\
    \ = await res.json();\\n      if (messages.length === 0) { logTerminal(\\\"No\
    \ messages in queue.\\\", \\\"info\\\"); return; }\\n      logTerminal(`Fetched\
    \ ${messages.length} messages:`, \\\"success\\\");\\n      messages.forEach((msg,\
    \ idx) => {\\n        logTerminal(`<b>Message #${idx + 1}</b> (Key: ${msg.routing_key}):<br/><pre\
    \ style=\\\"background: rgba(255,255,255,0.05); padding: 8px; border-radius: 4px;\
    \ margin: 4px 0; color: #f1c40f;\\\">${msg.payload}</pre>`, \\\"success\\\");\\\
    n      });\\n    } catch (err) {\\n      logTerminal(`Error: ${err.message}`,\
    \ \\\"error\\\");\\n    }\\n  };\\n\\n  window.confirmAndPurge = async function()\
    \ {\\n    const clusterKey = document.getElementById(\\\"purge-cluster\\\").value;\\\
    n    const queue = document.getElementById(\\\"purge-queue\\\").value;\\n    if\
    \ (!confirm(`Purge all messages in \\\"${queue}\\\" on ${clusterKey === \\\"oracle\\\
    \" ? \\\"Oracle VM\\\" : \\\"Tencent VM\\\"}?`)) {\\n      logTerminal(\\\"Purge\
    \ cancelled.\\\", \\\"info\\\"); return;\\n    }\\n    const url = clusterKey\
    \ === \\\"oracle\\\"\\n      ? `/oracle-api/api/queues/%2F/${queue}/contents`\\\
    n      : `/tencent-api/api/queues/%2F/${queue}/contents`;\\n    const auth = clusterKey\
    \ === \\\"oracle\\\" ? oracleAuth : tencentAuth;\\n    logTerminal(`Purging \\\
    \"${queue}\\\" on ${clusterKey === \\\"oracle\\\" ? \\\"Oracle VM\\\" : \\\"Tencent\
    \ VM\\\"}...`, \\\"outgoing\\\");\\n    try {\\n      const res = await fetch(url,\
    \ { method: \\\"DELETE\\\", headers: { \\\"Authorization\\\": auth, \\\"Content-Type\\\
    \": \\\"application/json\\\" } });\\n      if (!res.ok) throw new Error(await\
    \ res.text() || res.statusText);\\n      logTerminal(`Success! Queue \\\"${queue}\\\
    \" purged.`, \\\"success\\\");\\n    } catch (err) {\\n      logTerminal(`Error:\
    \ ${err.message}`, \\\"error\\\");\\n    }\\n  };\\n\\n  // Initialize\\n  setTimeout(async\
    \ () => {\\n    logTerminal(\\\"Console initialized. Detecting active cluster\
    \ role...\\\", \\\"info\\\");\\n    await detectActiveCluster();\\n    await Promise.all([loadDynamicQueues(),\
    \ loadDynamicRoutingKeys()]);\\n    logTerminal(\\\"Console ready.\\\", \\\"success\\\
    \");\\n  }, 200);\\n})();\\n</script>\\n\",\n        \"mode\": \"html\"\n    \
    \  }\n    }\n  ],\n  \"refresh\": \"\",\n  \"schemaVersion\": 39,\n  \"tags\"\
    : [\n    \"rabbitmq\"\n  ],\n  \"templating\": {\n    \"list\": []\n  },\n  \"\
    time\": {\n    \"from\": \"now-1h\",\n    \"to\": \"now\"\n  },\n  \"timepicker\"\
    : {},\n  \"timezone\": \"\",\n  \"title\": \"RabbitMQ Active Cluster Message Console\"\
    ,\n  \"version\": 1,\n  \"weekStart\": \"\"\n}"
