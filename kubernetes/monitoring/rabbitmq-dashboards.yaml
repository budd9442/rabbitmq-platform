apiVersion: v1
data:
  rabbitmq-console-dashboard.json: "{\n  \"annotations\": {\n    \"list\": [\n   \
    \   {\n        \"builtIn\": 1,\n        \"datasource\": {\n          \"type\"\
    : \"datasource\",\n          \"uid\": \"grafana\"\n        },\n        \"enable\"\
    : true,\n        \"hide\": true,\n        \"name\": \"Annotations & Alerts\",\n\
    \        \"type\": \"dashboard\"\n      }\n    ]\n  },\n  \"editable\": true,\n\
    \  \"fiscalYearStartMonth\": 0,\n  \"graphTooltip\": 0,\n  \"id\": null,\n  \"\
    links\": [],\n  \"liveNow\": false,\n  \"panels\": [\n    {\n      \"id\": 1,\n\
    \      \"title\": \"Interactive Message Console\",\n      \"type\": \"text\",\n\
    \      \"gridPos\": {\n        \"h\": 20,\n        \"w\": 24,\n        \"x\":\
    \ 0,\n        \"y\": 0\n      },\n      \"datasource\": {\n        \"type\": \"\
    datasource\",\n        \"uid\": \"grafana\"\n      },\n      \"options\": {\n\
    \        \"content\": \"\\n<div class=\\\"console-container\\\" style=\\\"padding:\
    \ 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica,\
    \ Arial, sans-serif; color: #e9ecef; background: rgba(18, 18, 24, 0.4); border-radius:\
    \ 12px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px);\
    \ display: flex; flex-direction: column; gap: 24px; box-shadow: 0 8px 32px 0 rgba(0,\
    \ 0, 0, 0.37);\\\">\\n  <h2 style=\\\"margin: 0; font-size: 20px; font-weight:\
    \ 600; color: #fff; background: linear-gradient(135deg, #f39c12, #f1c40f); -webkit-background-clip:\
    \ text; -webkit-text-fill-color: transparent;\\\">Active Cluster Message Console</h2>\\\
    n  \\n  <div style=\\\"display: flex; gap: 24px; flex-wrap: wrap;\\\">\\n    <!--\
    \ Send Panel -->\\n    <div style=\\\"flex: 1; min-width: 250px; padding: 20px;\
    \ background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255,\
    \ 0.05); border-radius: 8px; display: flex; flex-direction: column; gap: 16px;\\\
    \">\\n      <h3 style=\\\"margin: 0; font-size: 16px; font-weight: 500; color:\
    \ #f39c12;\\\">Send Message to Exchange</h3>\\n      \\n      <div style=\\\"\
    display: flex; flex-direction: column; gap: 6px;\\\">\\n        <label style=\\\
    \"font-size: 12px; color: #8a8a93; font-weight: 500;\\\">Routing Key</label>\\\
    n        <select id=\\\"send-routing-key\\\" style=\\\"background: rgba(0,0,0,0.5);\
    \ border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: #fff; padding:\
    \ 8px; font-size: 14px; outline: none; transition: border-color 0.2s;\\\">\\n\
    \          <option value=\\\"orders.test\\\">orders.test</option>\\n         \
    \ <option value=\\\"orders.create\\\">orders.create</option>\\n          <option\
    \ value=\\\"orders.delete\\\">orders.delete</option>\\n        </select>\\n  \
    \    </div>\\n      \\n      <div style=\\\"display: flex; flex-direction: column;\
    \ gap: 6px;\\\">\\n        <label style=\\\"font-size: 12px; color: #8a8a93; font-weight:\
    \ 500;\\\">Message Body / Payload</label>\\n        <textarea id=\\\"send-payload\\\
    \" rows=\\\"3\\\" style=\\\"background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);\
    \ border-radius: 4px; color: #fff; padding: 8px; font-size: 14px; outline: none;\
    \ font-family: monospace; resize: none;\\\" placeholder='{\\\"orderId\\\": 12345,\
    \ \\\"amount\\\": 99.99}'></textarea>\\n      </div>\\n      \\n      <button\
    \ onclick=\\\"publishMessage()\\\" style=\\\"background: linear-gradient(135deg,\
    \ #f39c12, #e67e22); border: none; border-radius: 4px; color: #fff; padding: 10px;\
    \ font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;\
    \ display: flex; justify-content: center; align-items: center;\\\" onmouseover=\\\
    \"this.style.opacity=0.9\\\" onmouseout=\\\"this.style.opacity=1.0\\\">Publish\
    \ Message</button>\\n    </div>\\n\\n    <!-- Get Panel -->\\n    <div style=\\\
    \"flex: 1; min-width: 250px; padding: 20px; background: rgba(255, 255, 255, 0.03);\
    \ border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; display: flex;\
    \ flex-direction: column; gap: 16px;\\\">\\n      <h3 style=\\\"margin: 0; font-size:\
