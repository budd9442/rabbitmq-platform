    \"Basic \\\" + btoa(tencentUser + \\\":\\\" + tencentPass);\\n\\n  // Detect active\
    \ cluster by checking policy definition\\n  let activeClusterUrl = \\\"/oracle-api\\\
    \";\\n  let activeClusterAuth = oracleAuth;\\n  let activeClusterName = \\\"Oracle\
