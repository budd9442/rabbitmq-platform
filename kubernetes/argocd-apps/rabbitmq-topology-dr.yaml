apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq-topology-dr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/budd9442/rmq.git'
    targetRevision: HEAD
    path: kubernetes/rabbitmq-topology/overlays/dr
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: rabbitmq
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
