apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders-app-sa
  namespace: orders-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orders-secret-reader
  namespace: orders-system
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["orders-svc-credentials"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orders-secret-reader-binding
  namespace: orders-system
subjects:
- kind: ServiceAccount
  name: orders-app-sa
  namespace: orders-system
roleRef:
  kind: Role
  name: orders-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-app-code
  namespace: orders-system
data:
  app.py: |
    import pika
    import time
    import json
    import random
    import os
    import sys
    import threading

    host = os.environ.get("RABBITMQ_HOST", "rabbitmq-prod.rabbitmq.svc.cluster.local")
    username = os.environ.get("RABBITMQ_USER", "orders-svc-user")
    password = os.environ.get("RABBITMQ_PASS", "orders_pass_secret_123!")
    vhost = "vhost_orders"

    print(f"Connecting to RabbitMQ at {host}:{5672}/{vhost} as user '{username}'...")
    credentials = pika.PlainCredentials(username, password)
    parameters = pika.ConnectionParameters(host, 5672, vhost, credentials)

    # Establish connection
    connection = None
    for i in range(15):
        try:
            connection = pika.BlockingConnection(parameters)
            break
        except Exception as e:
            print(f"Failed to connect: {e}. Retrying in 3s...")
            time.sleep(3)

    if not connection:
        print("Could not connect to RabbitMQ. Exiting.")
        sys.exit(1)

    channel = connection.channel()
    print("Connected successfully!")

    def callback(ch, method, properties, body):
        print(f" [Consumer] Received message: {body.decode()}")
        try:
            data = json.loads(body.decode())
            if data.get("type") in ["digital", "physical"] and "id" in data:
                print(f" [Consumer] Order {data['id']} validated successfully.")
                ch.basic_ack(delivery_tag=method.delivery_tag)
            else:
                raise ValueError("Invalid order type or missing ID")
        except Exception as e:
            print(f" [Consumer] Validation failed: {e}. Rejecting to DLQ...")
            ch.basic_nack(delivery_tag=method.delivery_tag, requeue=False)

    channel.basic_qos(prefetch_count=10)
    channel.basic_consume(queue="order_validation_q", on_message_callback=callback)

    def run_consumer():
        print("Starting consumer thread...")
        try:
            channel.start_consuming()
        except Exception as e:
            print(f"Consumer error: {e}")

    consumer_thread = threading.Thread(target=run_consumer, daemon=True)
    consumer_thread.start()

    # Publisher loop
    time.sleep(2)
    pub_conn = None
    for i in range(5):
        try:
            pub_conn = pika.BlockingConnection(parameters)
            break
        except Exception:
            time.sleep(2)
            
    if not pub_conn:
        print("Failed to start publisher connection. Exiting.")
        sys.exit(1)
        
    pub_chan = pub_conn.channel()
    pub_chan.confirm_delivery()

    order_id = 1
    while True:
        time.sleep(1.0)
        is_valid = random.random() < 0.8
        if is_valid:
            item_type = random.choice(["digital", "physical"])
            routing_key = f"order.{item_type}"
            payload = {
                "id": f"ord-{order_id}",
                "type": item_type,
                "items": ["item-1", "item-2"],
                "timestamp": time.time()
            }
            body = json.dumps(payload)
        else:
            routing_key = "order.invalid"
            if random.random() < 0.5:
                body = "NOT_A_VALID_JSON_STRING"
            else:
                body = json.dumps({"invalid_field": "no_id_here"})
                
        try:
            pub_chan.basic_publish(
                exchange="order_events",
                routing_key=routing_key,
                body=body,
                properties=pika.BasicProperties(
                    delivery_mode=2
                )
            )
            print(f" [Publisher] Sent message to {routing_key}: {body}")
            order_id += 1
        except Exception as e:
            print(f" [Publisher] Failed to send: {e}")
            # Try to reconnect publisher
            try:
                pub_conn = pika.BlockingConnection(parameters)
                pub_chan = pub_conn.channel()
                pub_chan.confirm_delivery()
            except Exception:
                pass
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-app
  namespace: orders-system
  labels:
    app: orders-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-app
  template:
    metadata:
      labels:
        app: orders-app
    spec:
      serviceAccountName: orders-app-sa
      containers:
      - name: python-app
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          pip install pika
          python /app/app.py
        env:
        - name: RABBITMQ_HOST
          value: rabbitmq-prod.rabbitmq.svc.cluster.local
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: orders-svc-credentials
              key: username
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: orders-svc-credentials
              key: password
        volumeMounts:
        - name: app-volume
          mountPath: /app
      volumes:
      - name: app-volume
        configMap:
          name: orders-app-code
